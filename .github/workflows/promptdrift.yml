name: Promptinel Monitor

on:
  schedule:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.promptinel/**'

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Promptinel watch
        run: node bin/promptinel.js watch
        env:
          CI: true

      - name: Upload snapshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptinel-snapshots-${{ github.run_number }}
          path: .promptinel/snapshots/
          retention-days: 30

      - name: Check for drift
        id: drift-check
        run: |
          node bin/promptinel.js report
        continue-on-error: true

      - name: Notify on drift (optional)
        if: steps.drift-check.outcome == 'failure'
        run: |
          echo "⚠️ Drift detected! Check the artifacts for details."
